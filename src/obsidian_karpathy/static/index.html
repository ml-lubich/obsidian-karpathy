<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Obsidian Karpathy Graph</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <aside class="panel sidebar">
        <div class="brand">
          <div class="mark">OK</div>
          <div>
            <p class="eyebrow">Obsidian Graph</p>
            <h1>Knowledge Map</h1>
          </div>
        </div>

        <label class="search">
          <span>Search</span>
          <input id="search" type="search" placeholder="Find notes, tags, or missing links" />
        </label>

        <div class="filters" aria-label="Node filters">
          <button class="filter active" data-kind="all">All</button>
          <button class="filter" data-kind="note">Notes</button>
          <button class="filter" data-kind="tag">Tags</button>
          <button class="filter" data-kind="missing">Missing</button>
        </div>

        <div class="stats" id="stats"></div>
      </aside>

      <section class="canvas-wrap" aria-label="Knowledge graph">
        <svg id="graph" role="img" aria-label="Interactive knowledge graph"></svg>
      </section>

      <aside class="panel inspector">
        <p class="eyebrow">Selection</p>
        <div id="inspector">
          <h2>No node selected</h2>
          <p>Click a node to inspect its links, backlinks, tags, and summary.</p>
        </div>
      </aside>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
    <script src="/static/app.js"></script>
  </body>
</html>
